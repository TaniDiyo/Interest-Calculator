<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Rate Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <div class="calculator-card">
            <header>
                <h1>Interest Calculator</h1>
                <p>Calculate your simple and compound interest instantly.</p>
            </header>
            
            <form id="calculator-form">
                <div class="input-group">
                    <label for="principal">Loan Amount (Principal)</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="principal" name="principal" placeholder="10000" min="0" step="0.01" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="rate">Interest Rate (%)</label>
                    <div class="input-wrapper">
                        <input type="number" id="rate" name="rate" placeholder="5" min="0" step="0.01" required>
                        <span class="percent-symbol">%</span>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="time">Time Period (Years)</label>
                    <div class="input-wrapper">
                        <input type="number" id="time" name="time" placeholder="5" min="0" step="0.1" required>
                    </div>
                </div>
                
                <button type="submit" id="calculate-btn">
                    <span>Calculate Now</span>
                    <div class="loader hidden"></div>
                </button>
            </form>
            
            <div id="error-message" class="error-message hidden"></div>
            
            <div id="results" class="results-section hidden">
                <h2>Results</h2>
                <div class="results-grid">
                    <div class="result-card simple-interest">
                        <h3>Simple Interest</h3>
                        <div class="result-row">
                            <span>Interest Earned:</span>
                            <span id="si-interest" class="amount">$0.00</span>
                        </div>
                        <div class="result-row total">
                            <span>Total Amount:</span>
                            <span id="si-total" class="amount total-amount">$0.00</span>
                        </div>
                    </div>
                    
                    <div class="result-card compound-interest">
                        <h3>Compound Interest</h3>
                        <div class="result-row">
                            <span>Interest Earned:</span>
                            <span id="ci-interest" class="amount">$0.00</span>
                        </div>
                        <div class="result-row total">
                            <span>Total Amount:</span>
                            <span id="ci-total" class="amount total-amount">$0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
